<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>RideNow — Driver</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/driver.css" />
  <link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAASsJTYQAAAAASUVORK5CYII=" />
</head>
<body>

  <!-- ===== IDENTITY MODAL ===== -->
  <div id="identityModal" class="modal-overlay" style="display:none">
    <div class="modal-card">
      <div class="modal-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <h2>Who's driving?</h2>
      <p>Select your name to sign in.</p>
      <div class="modal-form">
        <select id="driverSelect"><option value="">Choose driver…</option></select>
        <button id="selectDriverBtn" class="btn btn-primary btn-full">Sign in</button>
      </div>
    </div>
  </div>

  <!-- ===== MAIN APP (hidden until signed in) ===== -->
  <div id="appShell" class="app-shell">

    <!-- Status header -->
    <header class="header">
      <div class="header-brand">RideNow</div>
      <div class="header-meta">
        <span id="selectedDriver" class="driver-chip">Not signed in</span>
        <span id="status" class="status-chip">Offline</span>
      </div>
    </header>

    <!-- Action bar -->
    <div class="action-bar">
      <button id="startShiftBtn" class="btn btn-start">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Start Shift
      </button>
      <button id="stopShiftBtn" class="btn btn-stop" style="display:none">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
        End Shift
      </button>
      <button id="changeIdentityBtn" class="btn btn-ghost-sm" style="display:none">Change driver</button>
    </div>

    <!-- Request cards (scrollable) -->
    <div id="requests" class="request-list" style="display:none"></div>

    <!-- Empty state (when shift started but no requests) -->
    <div id="emptyState" class="empty-state" style="display:none">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>No ride requests yet</span>
    </div>
  </div>

  <!-- ===== NAVIGATION MODE (full-screen, like Google Maps) ===== -->
  <div id="navMode" class="nav-mode" style="display:none">
    <!-- Full-screen map -->
    <div id="navMap" class="nav-map"></div>

    <!-- Top instruction bar -->
    <div class="nav-instruction" id="navInstruction">
      <div class="nav-instruction-icon" id="navInstructionIcon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>
      </div>
      <div class="nav-instruction-text">
        <div id="navStepText" class="nav-step-text">Calculating route…</div>
        <div id="navStepDist" class="nav-step-dist"></div>
      </div>
    </div>

    <!-- Bottom info bar -->
    <div class="nav-bottom">
      <div class="nav-stats">
        <div class="nav-stat">
          <span class="nav-stat-value" id="navETA">—</span>
          <span class="nav-stat-label">min</span>
        </div>
        <div class="nav-stat-divider"></div>
        <div class="nav-stat">
          <span class="nav-stat-value" id="navDist">—</span>
          <span class="nav-stat-label">km</span>
        </div>
      </div>
      <div class="nav-actions">
        <button id="navRecenterBtn" class="nav-fab" title="Re-center">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
        </button>
        <button id="navCompleteBtn" class="btn btn-complete-nav">Complete Ride</button>
        <button id="navExitBtn" class="nav-fab nav-fab-close" title="Exit navigation">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ===== MAP MODAL (for previewing a request before accepting) ===== -->
  <div id="mapModal" class="modal-overlay map-modal" style="display:none">
    <div class="map-modal-inner">
      <div id="mapPopup" class="map-modal-map"></div>
      <div class="map-modal-toolbar">
        <button id="toggleDriverPathBtn" class="btn btn-chip">Driver route</button>
        <button id="togglePassengerRouteBtn" class="btn btn-chip">Passenger route</button>
        <button id="mapModalClose" class="btn btn-chip btn-chip-close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          Close
        </button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="js/driver.js"></script>
</body>
</html>
