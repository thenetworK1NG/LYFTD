<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Driver — Ride Requests</title>
  <style>
    body{font-family:Segoe UI,Arial;margin:18px}
    h1{font-size:20px}
    #requests{margin-top:12px}
    .req{padding:8px;border:1px solid #ddd;margin-bottom:8px;border-radius:6px}
    .meta{font-size:12px;color:#666}
    /* Mobile-friendly styles */
    #controls{display:flex;gap:12px;align-items:center;margin-top:8px}
    #locateBtn{padding:10px 14px;font-size:15px;border-radius:8px}
    .req{padding:12px;font-size:15px}
    .req .go{padding:8px 10px;border-radius:6px}

    /* Layout containers */
    .layout{display:flex;gap:12px;margin-top:12px;align-items:flex-start}
    #requests{width:360px;max-height:70vh;overflow:auto}
    #mapwrap{flex:1;min-width:320px;max-height:70vh}
    #map{width:100%;height:70vh;border:1px solid #ccc;border-radius:6px}

    /* Portrait-specific: stack requests above map and ensure visible heights */
    @media (orientation: portrait){
      body{margin:12px}
      h1{font-size:18px}
      .layout{flex-direction:column}
      #requests{width:100%!important;max-height:40vh}
      #map{height:50vh!important}
      .req{display:flex;flex-direction:column;gap:8px}
      .req .go{width:100%;box-sizing:border-box}
    }

    /* Smaller screens fallback */
    @media (max-width:700px){
      #requests{max-height:35vh}
      #map{height:50vh}
    }
  </style>
</head>
<body>
  <h1>Driver — Live Ride Requests</h1>
  <div id="controls">
    <button id="locateBtn">Use my location</button>
    <span id="status">Connecting…</span>
  </div>
  <div class="layout">
    <div id="requests"></div>
    <div id="mapwrap">
      <div id="map"></div>
    </div>
  </div>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="js/driver.js"></script>
</body>
</html>
