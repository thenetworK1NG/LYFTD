<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Driver — Ride Requests</title>
  <style>
    body{font-family:Segoe UI,Arial;margin:18px}
    h1{font-size:20px}
    #requests{margin-top:12px}
    .req{padding:8px;border:1px solid #ddd;margin-bottom:8px;border-radius:6px}
    .meta{font-size:12px;color:#666}
    /* Mobile-friendly styles */
    #controls{display:flex;gap:12px;align-items:center;margin-top:8px}
    #locateBtn{padding:10px 14px;font-size:15px;border-radius:8px}
    .req{padding:12px;font-size:15px}
    .req .go{padding:8px 10px;border-radius:6px}
    /* Responsive layout: stack on small screens */
    @media (max-width:700px){
      body{margin:12px}
      h1{font-size:18px}
      #controls{flex-direction:row;gap:8px}
      #requests{width:100%!important;max-height:30vh}
      #mapwrap{width:100%!important;min-width:0;}
      #map{height:50vh!important}
      .req{display:flex;flex-direction:column;gap:8px}
      .req .go{width:100%;box-sizing:border-box}
    }
  </style>
</head>
<body>
  <h1>Driver — Live Ride Requests</h1>
  <div id="controls">
    <button id="locateBtn">Use my location</button>
    <span id="status">Connecting…</span>
  </div>
  <div style="display:flex;gap:12px;margin-top:12px;align-items:flex-start;">
    <div id="requests" style="width:360px;max-height:70vh;overflow:auto"></div>
    <div id="mapwrap" style="flex:1;min-width:320px;max-height:70vh;">
      <div id="map" style="width:100%;height:70vh;border:1px solid #ccc;border-radius:6px"></div>
    </div>
  </div>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="js/driver.js"></script>
</body>
</html>
