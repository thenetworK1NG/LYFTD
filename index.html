<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RideNow — Driver Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/driver.css" />
  <link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAASsJTYQAAAAASUVORK5CYII=" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <h1>RideNow Driver</h1>
    </div>
    <div class="header-right">
      <span id="status" class="status-badge">Connecting…</span>
    </div>
  </header>

  <!-- Main container -->
  <div class="container">

    <!-- Controls bar -->
    <div class="controls">
      <button id="startShiftBtn" class="btn btn-primary btn-lg">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Start Shift
      </button>
      <button id="stopShiftBtn" class="btn btn-danger btn-lg" style="display:none">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
        Stop Shift
      </button>
      <div class="controls-spacer"></div>
      <button id="refreshBtn" class="btn btn-icon" title="Refresh location" style="display:none">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
      </button>
      <div id="selectedDriver" class="driver-badge">Not signed in</div>
    </div>

    <!-- Content layout -->
    <div class="layout">
      <div id="requests" class="requests-panel" style="display:none"></div>
      <div id="mapwrap" class="map-wrap">
        <div id="map" style="display:none"></div>
      </div>
    </div>
  </div>

  <!-- Identity modal -->
  <div id="identityModal" class="modal-overlay" style="display:none">
    <div id="identityCard" class="modal-card">
      <div class="modal-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <h2>Who's driving today?</h2>
      <p class="modal-desc">Choose your name to sign in — this will be remembered on this device.</p>
      <div class="modal-form">
        <select id="driverSelect">
          <option value="">Select your name…</option>
        </select>
        <button id="selectDriverBtn" class="btn btn-primary">Sign in</button>
      </div>
      <div class="modal-footer">
        <button id="changeIdentityBtn" class="btn btn-ghost" style="display:none">Change driver</button>
      </div>
    </div>
  </div>

  <!-- Fullscreen map modal (request detail) -->
  <div id="mapModal" class="modal-overlay map-modal" style="display:none">
    <div class="map-modal-inner">
      <div class="map-modal-toolbar">
        <button id="toggleDriverPathBtn" class="btn btn-chip">Toggle driver route</button>
        <button id="togglePassengerRouteBtn" class="btn btn-chip">Toggle passenger route</button>
        <button id="mapModalClose" class="btn btn-chip btn-chip-close">Close</button>
      </div>
      <div id="mapPopup" class="map-modal-map"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="js/driver.js"></script>
</body>
</html>
