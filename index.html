<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <title>Mzala Driver</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/driver.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>" />
</head>
<body>

  <!-- ===== TOP BAR ===== -->
  <header class="topbar">
    <div class="topbar-left">
      <h1 class="brand">Mzala<span>.</span></h1>
    </div>
    <div class="topbar-right">
      <span id="status" class="status-pill">
        <span class="status-dot"></span>
        <span class="status-text">Connecting…</span>
      </span>
      <button id="profileBtn" class="avatar-btn" title="Driver profile">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>
    </div>
  </header>

  <!-- ===== HOME SCREEN (offline state) ===== -->
  <main class="home" id="homeScreen">
    <div class="home-content">
      <div class="home-greeting">
        <p class="greeting-label" id="greetingLabel">Good morning</p>
        <p class="greeting-name" id="greetingName">&nbsp;</p>
      </div>
      <div class="go-online-wrap">
        <button id="startShiftBtn" class="go-online-btn">
          <span class="go-online-ring"></span>
          <span class="go-online-inner">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            <span>Go</span>
          </span>
        </button>
        <p class="go-online-label">Tap to go online</p>
      </div>
    </div>
  </main>

  <!-- ===== ONLINE SCREEN ===== -->
  <main class="online-screen" id="onlineScreen" style="display:none">
    <div id="requests" class="requests-list"></div>
    <div class="empty-state" id="emptyState">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"><circle cx="12" cy="12" r="10"/><path d="M8 12l2 2 4-4"/></svg>
      <p>You're online</p>
      <span>Waiting for ride requests…</span>
    </div>
  </main>

  <!-- ===== BOTTOM BAR (when online) ===== -->
  <div class="bottombar" id="bottomBar" style="display:none">
    <button id="refreshBtn" class="bottombar-btn" title="Refresh location">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 11-2.64-6.36"/><polyline points="21 3 21 9 15 9"/></svg>
      <span>Refresh</span>
    </button>
    <button id="stopShiftBtn" class="bottombar-btn bottombar-btn--stop">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
      <span>Go Offline</span>
    </button>
  </div>

  <!-- ===== HIDDEN MAP (for JS) ===== -->
  <div id="mapwrap" style="display:none"><div id="map"></div></div>

  <!-- ===== IDENTITY MODAL ===== -->
  <div id="identityModal" class="modal-overlay" style="display:none">
    <div id="identityCard" class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-logo">M<span>.</span></div>
      <h2>Welcome to Mzala</h2>
      <p class="modal-sub">Select your driver profile to get started.</p>
      <div class="modal-form">
        <div class="select-wrap">
          <select id="driverSelect">
            <option value="">Choose your name…</option>
          </select>
        </div>
        <button id="selectDriverBtn" class="btn-solid">Sign In</button>
      </div>
      <div class="modal-footer">
        <button id="changeIdentityBtn" class="btn-text" style="display:none">Switch driver</button>
      </div>
    </div>
  </div>

  <!-- ===== MAP MODAL (fullscreen) ===== -->
  <div id="mapModal" class="modal-overlay map-modal" style="display:none">
    <div class="map-modal-inner">
      <div class="map-modal-top">
        <button id="mapModalClose" class="map-close-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="mapPopup" class="map-modal-map"></div>
      <div class="map-modal-controls">
        <button id="toggleDriverPathBtn" class="pill-btn">Driver route</button>
        <button id="togglePassengerRouteBtn" class="pill-btn">Passenger route</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="js/driver.js"></script>
</body>
</html>
