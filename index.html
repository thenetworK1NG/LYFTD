<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Driver — Ride Requests</title>
  <style>
    :root{--primary:#1978c8;--muted:#666;--radius:10px}
    html,body{height:100%;margin:0;padding:env(safe-area-inset-top,12px) 12px 12px; -webkit-text-size-adjust:100%;}
    body{font-family:Segoe UI,Arial,Helvetica,'Noto Sans',sans-serif;background:#fff;color:#111}
    h1{font-size:18px;margin:6px 0}
    #requests{margin-top:12px}
    .req{padding:12px;border:1px solid #eee;margin-bottom:10px;border-radius:8px;background:#fff}
    .meta{font-size:13px;color:var(--muted)}

    /* Controls */
    #controls{display:flex;gap:10px;align-items:center;margin-top:8px}
    #locateBtn{padding:12px 16px;font-size:16px;border-radius:12px;background:var(--primary);color:#fff;border:0}

    /* Request card */
    .req{font-size:16px}
    .req .go{padding:10px 12px;border-radius:8px;background:var(--primary);color:#fff;border:0}
    .req .when{color:green;font-weight:600}
    .req .distance{color:#0b63d6;font-weight:600}

    /* Layout containers */
    .layout{display:flex;gap:12px;margin-top:12px;align-items:flex-start}
    #requests{width:100%;max-height:38vh;overflow:auto;padding-bottom:8px}
    #mapwrap{flex:1;min-width:0}
    #map{width:100%;height:48vh;border:1px solid #ddd;border-radius:10px}

    /* Portrait: stack requests above map and increase hit areas */
    @media (orientation: portrait), (max-width:700px){
      body{padding:12px}
      .layout{flex-direction:column}
      #requests{width:100%!important;max-height:35vh}
      #map{height:50vh!important}
      .req{display:flex;flex-direction:column;gap:8px}
      .req .go{width:100%;box-sizing:border-box}
      #locateBtn{flex:0 0 auto}
    }
  </style>
</head>
<body>
  <div class="header"><h1>Driver — Live Requests</h1></div>
  <div class="container">
    <div class="controls">
      <button id="startShiftBtn" class="bigBtn">Start Shift</button>
      <button id="stopShiftBtn" class="bigBtn" style="display:none;background:#e55353">Stop Shift</button>
      <button id="locateBtn" class="bigBtn" style="display:none">Use my location</button>
      <div class="status" id="selectedDriver">Not signed in</div>
      <div style="flex:1"></div>
      <div id="status">Connecting…</div>
    </div>

    <div class="layout">
      <div id="requests" style="display:none"></div>
      <div id="mapwrap">
        <div id="map" style="display:none"></div>
      </div>
    </div>
  </div>

  <!-- Identity modal (shown to drivers, not admin-like) -->
  <div id="identityModal" style="display:none">
    <div id="identityCard">
      <h2>Who's driving today?</h2>
      <div style="font-size:13px;color:#666;margin-bottom:10px">Choose your name to sign in — this will be remembered on this device.</div>
      <div class="row">
        <select id="driverSelect">
          <option value="">-- Select driver identity --</option>
        </select>
        <button id="selectDriverBtn">Sign in</button>
      </div>
      <div style="margin-top:10px;text-align:right"><button id="changeIdentityBtn" style="display:none;background:#eee;color:#111;padding:8px 10px;border-radius:8px;border:0">Change</button></div>
    </div>
  </div>

  <!-- Fullscreen map modal shown when driver opens a request -->
  <div id="mapModal" style="display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.45);align-items:center;justify-content:center;">
    <div style="position:relative;width:100%;height:100%;display:flex;flex-direction:column;">
      <div style="padding:10px;background:transparent;display:flex;justify-content:flex-end;gap:8px;align-items:center;">
        <button id="toggleDriverPathBtn" style="padding:8px 10px;border-radius:8px;border:0;background:#fff">Toggle driver→dest</button>
        <button id="togglePassengerRouteBtn" style="padding:8px 10px;border-radius:8px;border:0;background:#fff">Toggle passenger route</button>
        <button id="mapModalClose" style="padding:10px 12px;border-radius:10px;border:0;background:#fff">Close</button>
      </div>
      <div id="mapPopup" style="flex:1 1 auto;margin:12px;border-radius:10px;overflow:hidden;background:#fff"></div>
    </div>
  </div>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/driver.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="js/driver.js"></script>
</body>
</html>
